<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Driver App (FREE)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }
#box {
 position:fixed;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 background:white;
 padding:20px;
 display:none;
 z-index:1000;
}
button { padding:10px 20px; font-size:16px; }
</style>
</head>

<body>

<div id="box">
<p id="info"></p>
<button onclick="accept()">Accept</button>
</div>

<div id="map"></div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBc9H83sV-EX-cQ2-7RbBKWOYJcoFG9874",
            databaseURL: "https://mytaxiapp-b552e-default-rtdb.firebaseio.com",
            projectId: "mytaxiapp-b552e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Leaflet map
let map = L.map('map').setView([6.9271,79.8612],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let curLat, curLng;
let currentTrip=null;
let driverMarker = L.marker([6.9271,79.8612]).addTo(map);

// Live GPS
navigator.geolocation.watchPosition(pos=>{
    curLat = pos.coords.latitude;
    curLng = pos.coords.longitude;

    driverMarker.setLatLng([curLat, curLng]);

    if(currentTrip){
        db.ref('trips/' + currentTrip).update({
            driver_lat: curLat,
            driver_lng: curLng
        });
    }
});

// Distance calculation
function distance(a,b,c,d){
    let R=6371;
    let dLat=(c-a)*Math.PI/180;
    let dLon=(d-b)*Math.PI/180;
    let x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// Listen trips
db.ref('trips').on('value', snap=>{
    let data = snap.val();
    for(let id in data){
        let t = data[id];
        if(t.status==="searching" && curLat){
            let d = distance(curLat, curLng, t.pickup_lat, t.pickup_lng);
            if(d < 1){
                currentTrip = id;
                document.getElementById('info').innerText = "Distance: " + d.toFixed(2) + " km";
                document.getElementById('box').style.display='block';
            }
        }
    }
});

function accept(){
    db.ref('trips/' + currentTrip).update({
        status:"accepted",
        driver_lat: curLat,
        driver_lng: curLng
    });
    document.getElementById('box').style.display='none';
}
</script>
</body>
</html>
