<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Passenger - PickMe Clone</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { font-family: sans-serif; margin: 0; }
        #map { height: 70vh; width: 100%; background: #eee; }
        .panel { padding: 20px; text-align: center; background: white; }
        button { padding: 15px; width: 80%; background: #ffc107; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <p id="status">සිතියම මත ක්ලික් කර යන තැන තෝරන්න</p>
        <button onclick="confirmBooking()">ගමන තහවුරු කරන්න (Confirm)</button>
    </div>

    <script src="https://unpkg.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBc9H83sV-EX-cQ2-7RbBKWOYJcoFG9874",
            databaseURL: "https://firebaseio.com",
            projectId: "mytaxiapp-b552e"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        var map = L.map('map').setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var pickupMarker = L.marker([0,0]).addTo(map).bindPopup("මම මෙතැන");
        var dropMarker = L.marker([0,0]).addTo(map);
        var tripData = { pickup_lat: 0, pickup_lng: 0, drop_lat: 0, drop_lng: 0, status: "idle" };

        // 1. Live Location Track කිරීම
        navigator.geolocation.watchPosition(pos => {
            tripData.pickup_lat = pos.coords.latitude;
            tripData.pickup_lng = pos.coords.longitude;
            pickupMarker.setLatLng([tripData.pickup_lat, tripData.pickup_lng]);
        });

        // 2. Map එක මත ක්ලික් කර යන තැන තේරීම
        map.on('click', function(e) {
            tripData.drop_lat = e.latlng.lat;
            tripData.drop_lng = e.latlng.lng;
            dropMarker.setLatLng(e.latlng);
            document.getElementById('status').innerText = "ගමනාන්තය තෝරා ගත්තා!";
        });

        function confirmBooking() {
            if(tripData.drop_lat == 0) return alert("කරුණාකර යන තැන සිතියමෙන් තෝරන්න!");
            tripData.status = "searching";
            database.ref('trips/trip1').set(tripData);
            document.getElementById('status').innerText = "රියදුරෙකු සොයමින් පවතී...";
        }

        // රියදුරා හයර් එක බාරගත් විට දැනුම් දීම
        database.ref('trips/trip1').on('value', snap => {
            if(snap.val() && snap.val().status === "accepted") {
                document.getElementById('status').innerText = "රියදුරා ඔබ වෙත එමින් පවතී!";
            }
        });
    </script>
</body>
</html>
