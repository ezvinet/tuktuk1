<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Passenger App (FREE)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:90vh; }
button { width:100%; padding:15px; font-size:18px; }
</style>
</head>

<body>
<h3>Passenger App</h3>
<div id="map"></div>
<button id="confirmBtn" onclick="confirmRide()">Confirm Ride</button>

<script>
// Firebase config
const firebaseConfig = {
 apiKey: "AIzaSyBc9H83sV-EX-cQ2-7RbBKWOYJcoFG9874",
            databaseURL: "https://mytaxiapp-b552e-default-rtdb.firebaseio.com",
            projectId: "mytaxiapp-b552e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map = L.map('map').setView([6.9271,79.8612],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let pickup=null, drop=null, tripId=null;
let driverMarker = L.marker([0,0]).addTo(map);

// Pickup auto
navigator.geolocation.getCurrentPosition(pos=>{
    pickup = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    L.marker([pickup.lat, pickup.lng]).addTo(map).bindPopup("Pickup").openPopup();
    map.setView([pickup.lat, pickup.lng],15);
});

// Drop select
map.on('click', e=>{
    drop = e.latlng;
    L.marker(drop).addTo(map).bindPopup("Drop").openPopup();
});

// Confirm Ride
function confirmRide(){
    if(!pickup || !drop){
        alert("Select drop location");
        return;
    }

    tripId = "trip_" + Date.now();

    db.ref('trips/' + tripId).set({
        pickup_lat: pickup.lat,
        pickup_lng: pickup.lng,
        drop_lat: drop.lat,
        drop_lng: drop.lng,
        status: "searching"
    });

    alert("Ride Confirmed! Waiting for Driver...");
    document.getElementById('confirmBtn').disabled = true;

    listenDriver();
}

// Listen driver updates
function listenDriver(){
    db.ref('trips/' + tripId).on('value', snap=>{
        let t = snap.val();
        if(!t) return;

        if(t.status === "accepted"){
            alert("Driver accepted!");
        }

        if(t.driver_lat){
            driverMarker.setLatLng([t.driver_lat, t.driver_lng]);
        }
    });
}
</script>
</body>
</html>
