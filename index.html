<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger - GitHub Host</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { font-family: sans-serif; margin: 0; }
        #map { height: 75vh; width: 100%; background: #eee; }
        .panel { padding: 15px; text-align: center; }
        button { padding: 15px; width: 90%; background: #ffc107; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <p id="status">ඔබේ ස්ථානය සොයමින්...</p>
        <button onclick="confirmBooking()">Confirm Ride</button>
    </div>

    <script src="https://unpkg.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBc9H83sV-EX-cQ2-7RbBKWOYJcoFG9874",
            databaseURL: "https://firebaseio.com",
            projectId: "mytaxiapp-b552e"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // මැප් එක මුලින්ම කොළඹට සෙට් කරනවා
        var map = L.map('map').setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var pickupMarker = L.marker([0,0]).addTo(map).bindPopup("ඔබ මෙතැන");
        var dropMarker = L.marker([0,0]).addTo(map);
        var tripData = { pickup_lat: 0, pickup_lng: 0, drop_lat: 0, drop_lng: 0, status: "idle" };

        // --- මෙන්න මේක තමයි ලොකේෂන් එක AUTO ගන්න කොටස ---
        function findMyCity() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    tripData.pickup_lat = pos.coords.latitude;
                    tripData.pickup_lng = pos.coords.longitude;

                    // මැප් එක ඔබ ඉන්න තැනට හරියටම ගෙන යනවා
                    map.setView([tripData.pickup_lat, tripData.pickup_lng], 16);
                    pickupMarker.setLatLng([tripData.pickup_lat, tripData.pickup_lng]);
                    
                    document.getElementById('status').innerText = "ස්ථානය හඳුනාගත්තා. යන තැන ක්ලික් කරන්න.";
                }, (err) => {
                    alert("GPS වැඩ කරන්නේ නැහැ. කරුණාකර Permission Allow කරන්න.");
                }, { enableHighAccuracy: true });
            }
        }

        // පිටුව ලෝඩ් වුණු ගමන්ම ලොකේෂන් එක හොයන්න
        window.onload = findMyCity;

        map.on('click', function(e) {
            tripData.drop_lat = e.latlng.lat;
            tripData.drop_lng = e.latlng.lng;
            dropMarker.setLatLng(e.latlng);
            document.getElementById('status').innerText = "ගමනාන්තය තෝරාගත්තා!";
        });

        function confirmBooking() {
            if(tripData.drop_lat == 0) return alert("යන තැන තෝරන්න!");
            tripData.status = "searching";
            database.ref('trips/trip1').set(tripData).then(() => {
                alert("රියදුරෙකු සොයමින් පවතී...");
            });
        }
    </script>
</body>
</html>
